server:
  port: 8080

spring:
  devtools:
    restart:
      # Évite des ClassNotFoundError intermittents (ex. AdminService) quand le RestartClassLoader
      # se retrouve avec un classpath partiel. Redémarrer l’appli manuellement après un changement Java.
      enabled: false
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

logging:
  level:
    # DevTools : réduit le bruit (rapport "CONDITION EVALUATION DELTA" à chaque redémarrage)
    org.springframework.boot.devtools: warn

mobili:
  security:
    jwt:
      secret-key: ${JWT_SECRET}
  backend:
    upload:
      root-directory: uploads
      users: users
      partners: partners
      vehicles: vehicles

fedapay:
  secret:
    key: ${FEDAPAY_SECRET_KEY}
  webhook:
    secret: ${FEDAPAY_WEBHOOK_SECRET}