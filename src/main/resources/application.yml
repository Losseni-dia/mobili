server:
  port: 8080

spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

mobili:
  security:
    jwt:
      secret-key: ${JWT_SECRET}
  backend:
    upload:
      root-directory: uploads
      users: users
      partners: partners
      vehicles: vehicles

fedapay:
  secret:
    key: ${FEDAPAY_SECRET_KEY}
  webhook:
    secret: ${FEDAPAY_WEBHOOK_SECRET}